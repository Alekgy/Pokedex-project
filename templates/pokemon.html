{% extends 'base.html' %}

{% block title %}
    {{ super() }} Pokedex - Explorar
{% endblock %}

{% block content %}
    <header class="main-head">
        <nav>
            <h1 id="logo">Pokedex</h1>
        </nav>
    </header>

    <div class="container">
        <h1>Bienvenido a la Pokedex!</h1>
        
        <!-- ==========================================
        NUEVA BARRA DE BÚSQUEDA UNIFICADA
        ========================================== -->
        <div class="search-container" style="margin: 30px auto; max-width: 500px;">
            <form action="{{ url_for('obtener_pokemons') }}" method="POST" style="display: flex; gap: 10px; width: 100%;">
                <input type="text" 
                        name="busqueda_pokemon" 
                        placeholder="Busca por Nombre o ID (ej: 4 o Charmander)..." 
                        required
                        style="flex: 1; padding: 12px 20px; border: 2px solid #cbd5e1; border-radius: 12px; font-size: 1rem; outline: none; transition: border-color 0.2s;">
                <button type="submit" 
                        style="background-color: var(--primary-color); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: background-color 0.2s;">
                    Buscar
                </button>
            </form>
        </div>

        <h2 style="margin-top: 40px;">O selecciona un tipo de Pokémon para explorar:</h2>
        
        <div class="types-container">
            {% for tipo in tipos %}
                <a href="{{ url_for('lista_por_tipo', tipo_elegido=tipo) }}" class="type-btn {{ tipo | lower }}">
                    {{ tipo }}
                </a>
            {% endfor %}
        </div>
    </div>
{% endblock %}
